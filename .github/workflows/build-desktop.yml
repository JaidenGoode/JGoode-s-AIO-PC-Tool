name: Build Desktop App (Windows Installer)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore NuGet packages
        working-directory: desktop
        run: dotnet restore

      - name: Convert PNG icon to ICO (ImageMagick)
        run: |
          magick "desktop\Assets\icon.png" -resize 256x256 "desktop\Assets\icon.ico"
          Write-Host "Icon converted successfully"

      - name: Publish self-contained app
        working-directory: desktop
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:ApplicationIcon=Assets\icon.ico `
            -o ../publish/win-x64

      - name: Download Visual C++ 2022 x64 Redistributable
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "publish\vc_redist.x64.exe" -UseBasicParsing
          Write-Host "Downloaded VC++ redistributable: $((Get-Item publish\vc_redist.x64.exe).Length) bytes"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "desktop\installer.iss"
          Write-Host "Installer compiled successfully"

      - name: List installer output
        run: Get-ChildItem installer-output -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JGoodeAIO-Installer
          path: installer-output/JGoodeAIO-Setup.exe
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "JGoode A.I.O PC Tool ${{ github.ref_name }}"
          body: |
            ## JGoode A.I.O PC Tool ${{ github.ref_name }}

            ### How to install
            1. Download **`JGoodeAIO-Setup.exe`** below
            2. Run it (click **Yes** if Windows asks for admin permission)
            3. Follow the installer — it sets up everything automatically
            4. Launch from your **Desktop shortcut** or Start Menu

            > The installer includes all required runtimes. No separate downloads needed.

            ### Features
            - 47 PowerShell system tweaks (privacy, performance, gaming, debloat)
            - Live CPU / RAM / GPU / Disk monitoring
            - System cleaner (temp files, DNS flush, network reset)
            - 13 accent colors + dark/light mode
            - GitHub settings sync
            - Self-contained — no .NET or VC++ runtime installation required
          files: installer-output/JGoodeAIO-Setup.exe
          draft: false
          prerelease: false
