name: Build Desktop App (Electron)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build web app (server + client)
        run: npm run build

      - name: Install Electron build tools
        run: npm install --no-save electron electron-builder

      - name: Build Electron installer
        run: npx electron-builder --win --x64 --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist output
        run: Get-ChildItem dist -Recurse -Name | Select-Object -First 30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JGoodeAIO-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "JGoode A.I.O PC Tool ${{ github.ref_name }}"
          body: |
            ## JGoode A.I.O PC Tool ${{ github.ref_name }}

            ### How to install
            1. Download **`JGoode AIO PC Tool Setup*.exe`** below
            2. Run it — Windows will ask for admin permission, click **Yes**
            3. Follow the installer, launch from Desktop shortcut

            ### Features
            - 47 PowerShell system tweaks (privacy, performance, gaming, debloat)
            - Live CPU / RAM / GPU / Disk monitoring
            - System cleaner (temp files, DNS flush, network reset)
            - 13 accent colors + dark/light mode
            - GitHub settings sync
          files: dist/*.exe
          draft: false
          prerelease: false
